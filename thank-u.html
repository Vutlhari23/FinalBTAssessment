!<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title></title>
    <style>
      @import url(https://fonts.google.com/specimen/Roboto);
      body{

        background-color: hsl(234, 29%, 20%);
        width: 1440px;
        height:auto;
      color: hsl(234, 29%, 20%);
      font-family : 'arial';
      font-size: 16px;
      font-weight: 400, 700;
      align-items: center;
      }
      #div1{

        width: 65%;
        margin: 7%;


      }
      #main{
        margin-top: 300px;
        margin-left: 50%;
        display: flex;
        width: 25%;
        background-color: white;
        border-radius: 10px;
justify-content: center;

      }
      #div2{

        margin: 10px;
      }
      img{
        width: 20px;
        height: 40px;
      }
      button{
        background-color: hsl(234, 29%, 20%);
        color: white;
       width: 80%;
       height:50px;
       border-radius:5px;
      }
    </style>
 <script >

 window.addEventListener('load', (event) => {
   let email = localStorage.getItem("email");

   document.getElementById('para').innerHTML = "A conformation email has been sent to "+email+". Please open it and click the button inside the button inside to conform your subscription."

});

 function dismiss(){
   localStorage.clear()
    window.location.href="index.html"

 }


 </script>
  </head>
  <body>
    <div id="main">
    <div class="" id="div1">

  <img src="icon-success.svg" alt="">
  <h1>Thanks for subscibing!</h1>
  <p id="para"> </p>
  <button type="button" name="button"  id="btn"onclick="dismiss()">Dismiss message</button>


</div>

  </body>
</html>
